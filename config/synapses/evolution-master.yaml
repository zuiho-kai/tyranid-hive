# 进化大师 —— 小主脑配置
# Tier 2：负责经验萃取、基因进化与作战手册结晶

synapse:
  name: "evolution-master"
  display_name: "进化大师"
  tier: 2
  state: resident

  domains:
    - consolidation
    - lesson_extraction
    - playbook_evolution
    - gene_mutation
    - performance_analysis

  model:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    temperature: 0.3
    max_tokens: 6000

  gene: "L2_synapse_evolution"

  brood_limits:
    max_concurrent: 2
    max_units_per_brood: 5

  tools:
    allowed:
      - lessons_create
      - lessons_search
      - playbook_create
      - playbook_update
      - task_read
      - file_read
    forbidden:
      - code_execute
      - system_shell
      - network_exploit

  memory:
    scope: "hive_global"
    shared: true

  responsibilities:
    - "处于 Consolidating 状态的任务：萃取经验教训"
    - "判断是否需要更新或新建作战手册"
    - "评估旧 Playbook 成功率，决定是否结晶（crystallize）"
    - "向基因库注入新的领域知识"

  lesson_extraction:
    trigger_states:
      - Consolidating
      - Complete
    min_content_length: 50
    auto_tag: true
    decay_threshold_days: 30     # 30天未用则标记为过期

  playbook_evolution:
    crystallize_threshold:
      use_count: 10
      success_rate: 0.8
    ema_alpha: 0.1               # success_rate 更新步长

  kill_mark_weights:
    lesson_quality: 2.5
    playbook_accuracy: 2.0
    gene_diversity: 1.5
