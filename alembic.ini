# Alembic 配置文件
# 使用方式：alembic upgrade head

[alembic]
# 迁移脚本目录
script_location = migrations

# 模板文件（可选，默认即可）
# file_template = %%(rev)s_%%(slug)s

# 数据库 URL —— 优先从环境变量读取，本地开发 fallback 到 SQLite
# 生产部署时设置：HIVE_DATABASE_URL=postgresql+asyncpg://user:pass@host/dbname
sqlalchemy.url = driver://user:pass@localhost/dbname

# 时区
# timezone = UTC

[post_write_hooks]
# 可配置 black/ruff 自动格式化生成的迁移文件
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
